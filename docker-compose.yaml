services:
  chromium:
    image: lscr.io/linuxserver/chromium:latest
    container_name: chromium
    security_opt:
      - seccomp:unconfined
    environment:
      - CUSTOM_USER=admin
      - PASSWORD=admin123
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Kolkata
      - CHROME_CLI=https://google.com
    volumes:
      - /config:/config
    ports:
      - "3000:3000"
    shm_size: "1gb"
    restart: unless-stopped
